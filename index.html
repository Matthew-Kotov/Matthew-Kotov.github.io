<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта квартир - Фильтр</title>
    
    <!-- Leaflet CSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <!-- Наши стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Карта -->
    <div id="map"></div>
    
    <!-- Панель управления -->
    <div class="control-panel">
        <!-- Кнопки управления слоями -->
        <div class="layer-controls">
            <button id="toggle-schools" class="layer-btn inactive" data-layer="schools">
                <span>🏫 Школы</span>
            </button>
            <button id="toggle-kindergartens" class="layer-btn inactive" data-layer="kindergartens">
                <span>🏠 Детсады</span>
            </button>
            <button id="toggle-hospitals" class="layer-btn inactive" data-layer="hospitals">
                <span>🏥 Больницы</span>
            </button>
            <button id="toggle-stops" class="layer-btn inactive" data-layer="stops">
                <span>🚏 Остановки</span>
            </button>
            <!-- Кнопка для цен добавится динамически -->
        </div>

        <button id="show-list-btn" class="menu-button">
            <span>📋 Список</span>
        </button>
        
        <!-- Кнопка меню фильтров -->
        <button id="menu-button" class="menu-button">
            <span>☰ Фильтры</span>
        </button>
    </div>
    
    <!-- Боковое меню -->
    <div id="side-menu" class="side-menu">
        <div class="menu-header">
            <h3>Фильтр квартир</h3>
            <button id="close-menu" class="close-btn">×</button>
        </div>
        
        <div class="form-section">
            <label for="deal-type">Тип сделки:</label>
            <select id="deal-type" class="form-control">
                <option value="sale">Продажа</option>
                <option value="rent">Аренда</option>
            </select>
        </div>
        
        <div class="form-section">
            <label for="price-max">Максимальная цена:</label>
            <input type="number" id="price-max" class="form-control" placeholder="Например: 10">
            <small>в млн. рублей (продажа) / в рублях (аренда)</small>
        </div>
        
        <div class="form-section">
            <label for="area-min">Минимальная площадь:</label>
            <input type="number" id="area-min" class="form-control" placeholder="Например: 40">
            <small>кв.м.</small>
        </div>
        
        <div class="form-section">
            <label>Количество комнат:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="rooms" value="-1"> Свободная планировка</label>
                <label><input type="checkbox" name="rooms" value="1"> 1 комната</label>
                <label><input type="checkbox" name="rooms" value="2"> 2 комнаты</label>
                <label><input type="checkbox" name="rooms" value="3"> 3 комнаты</label>
                <label><input type="checkbox" name="rooms" value="4"> 4 комнаты</label>
            </div>
        </div>

<div class="form-section">
    <label>Объекты рядом:</label>
    <div class="checkbox-group" id="nearby-objects">
        <label><input type="checkbox" name="nearby" value="schools"> 🏫 Школы</label>
        <label><input type="checkbox" name="nearby" value="kindergartens"> 🏠 Детские сады</label>
        <label><input type="checkbox" name="nearby" value="hospitals"> 🏥 Больницы</label>
        <label><input type="checkbox" name="nearby" value="stops"> 🚏 Остановки</label>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 8px;">
        <button type="button" id="check-all-nearby" class="btn btn-secondary" style="flex: 1;">✅ Выбрать все</button>
        <button type="button" id="uncheck-all-nearby" class="btn btn-secondary" style="flex: 1;">❌ Снять все</button>
    </div>
    <small>Можно выбрать несколько вариантов. Используйте кнопки для быстрого выбора.</small>
</div>

        <div class="form-section">
            <label for="radius">Радиус до объекта:</label>
            <input type="number" id="radius" class="form-control" value="500" min="100" max="5000" step="100">
            <small>метров (влияет на поиск рядом с выбранными объектами)</small>
        </div>

        <div class="form-section">
            <label>Произвольная точка:</label>
            <div class="custom-point-info">
                <p id="custom-point-coords">Координаты: не установлены</p>
                <button id="set-custom-point" class="btn btn-secondary" style="margin-top: 5px;">
                    Установить точку на карте
                </button>
                <button id="clear-custom-point" class="btn btn-secondary" style="margin-top: 5px;">
                    Очистить точку
                </button>
            </div>
        </div>

        <div class="form-section">
            <label for="show-buffers">
                <input type="checkbox" id="show-buffers" checked>
                Показывать буферную зону
            </label>
        </div>

        <div class="form-section">
            <label for="district">Район:</label>
            <select id="district" class="form-control">
                <option value="">Любой район</option>
                <!-- Районы будут заполнены динамически -->
            </select>
        </div>
        
        <div class="form-actions">
            <button id="apply-filters" class="btn btn-primary">Применить фильтр</button>
            <button id="clear-filters" class="btn btn-secondary">Очистить фильтр</button>
        </div>
        
        <div class="results-info">
            <p id="results-count">Найдено квартир: 0</p>
        </div>
    </div>

    <div id="list-panel" class="list-panel">
        <div class="list-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <h3>Список квартир (<span id="list-count">0</span>)</h3>
                <button id="download-excel" class="download-btn" title="Скачать в Excel">
                    📥
                </button>
            </div>
            <button id="close-list" class="close-btn">×</button>
        </div>
        <div id="apartments-list" class="apartments-list">
            <!-- Список будет генерироваться динамически -->
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    
    <!-- Наши скрипты -->
    <script src="config.js"></script>
    <script src="app.js"></script>

</body>
</html>
